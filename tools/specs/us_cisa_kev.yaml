id: us_cisa_kev
server_name: us-cisa-kev
title: CISA Known Exploited Vulnerabilities
base_url: https://www.cisa.gov/sites/default/files/feeds
description: "US-CISA Known Exploited Vulnerabilities catalog — authoritative list of vulnerabilities observed exploited in the wild, with remediation due-dates for US federal agencies under BOD 22-01."
homepage: https://www.cisa.gov/known-exploited-vulnerabilities-catalog
domains:
- security
- government
regions:
- us
- global
keywords:
- cisa
- kev
- known-exploited
- vulnerability
- exploit
- cve
