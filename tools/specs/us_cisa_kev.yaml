license_note: "CISA KEV is in the public domain (US federal work)."
notes: |
  The upstream catalog is a single JSON document at
  https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
  refreshed several times per week. The provider caches it for one hour
  and filters client-side. Generator can't fully express the client-side
  filtering tools, so the implementation is hand-written; this spec
  remains as documentation.
tools:
- name: cisa-kev-list
  description: List entries from the catalog, optionally filtered by vendor, product, ransomware-known-use, or date_added range.
- name: cisa-kev-get
  description: Look up a single CVE in the catalog by id (case-insensitive).
