id: us_fayetteville
server_name: us-fayetteville
base_url: https://data.fayettevillenc.gov
homepage: https://data.fayettevillenc.gov
description: City of Fayetteville Socrata-backed open data provider.
tools:
  - name: us-fayetteville-search-catalog
    description: Search Fayetteville open data catalog metadata.
    endpoint: /api/views
    response_format: json
    params:
      - name: q
        type: string
        required: false
        description: Free-text catalog query.
      - name: limit
        type: int
        required: false
        default: 20
        description: Maximum catalog results.
  - name: us-fayetteville-get-metadata
    description: Fetch Fayetteville dataset metadata by Socrata dataset id.
    endpoint: /api/views/{dataset_id}
    response_format: json
    params:
      - name: dataset_id
        type: string
        required: true
        description: Socrata dataset id.
